name: Deployment Status
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - uses: actions/checkout@v4

      - name: Set pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              description: 'Deploying to Render...',
              context: 'Render Deployment'
            });

      - name: Wait for Render deploy and verify
        run: |
          echo "Waiting for Render to deploy..."
          URL="https://ojt-ecommerce-website.onrender.com"
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Site is live (200)"
              echo "status=success" >> $GITHUB_ENV
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE — waiting..."
            sleep 10
          done
          echo "Site did not return 200 after 30 attempts"
          echo "status=failure" >> $GITHUB_ENV
          exit 1

      - name: Set final status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = process.env.status === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: state,
              description: state === 'success' ? 'Deployed successfully' : 'Deployment failed',
              context: 'Render Deployment'
            });
