# =============================================================================
# keep-alive.yml — GitHub Actions workflow
# Keeps the Render free-tier app from spinning down (15-min idle timeout).
# Pings every 10 minutes with a 120s timeout.
# =============================================================================
name: Keep Render alive
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: curl -sL -m 120 https://ojt-ecommerce-website.onrender.com
