services:
  - type: web
    name: fitness-hub
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn fitness_hub.wsgi:application --workers=4 --threads=2 --worker-class=gthread
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: fitness-hub-db
          property: connectionString
      - key: EMAIL_VERIFICATION_REQUIRED
        value: "False"
      - key: BASE_URL
        value: "https://fitness-hub.onrender.com"

databases:
  - name: fitness-hub-db
    plan: free
