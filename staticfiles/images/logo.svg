<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" fill="none">
  <defs>
    <linearGradient id="gGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d78e"/>
      <stop offset="40%" stop-color="#e8c97e"/>
      <stop offset="100%" stop-color="#c4783a"/>
    </linearGradient>
    <linearGradient id="gGold2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a0662a"/>
    </linearGradient>
    <linearGradient id="gBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8c97e"/>
      <stop offset="50%" stop-color="#f5d78e"/>
      <stop offset="100%" stop-color="#c4783a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dumbbell icon -->
  <g transform="translate(6, 8)">
    <!-- Bar -->
    <rect x="18" y="22" width="42" height="8" rx="4" fill="url(#gBar)" filter="url(#glow)"/>
    <!-- Left outer weight -->
    <rect x="4" y="14" width="12" height="24" rx="4" fill="url(#gGold2)"/>
    <rect x="1" y="10" width="7" height="32" rx="3.5" fill="url(#gGold)"/>
    <!-- Left inner weight -->
    <rect x="16" y="16" width="6" height="20" rx="3" fill="url(#gGold2)"/>
    <!-- Right inner weight -->
    <rect x="56" y="16" width="6" height="20" rx="3" fill="url(#gGold2)"/>
    <!-- Right outer weight -->
    <rect x="62" y="14" width="12" height="24" rx="4" fill="url(#gGold2)"/>
    <rect x="70" y="10" width="7" height="32" rx="3.5" fill="url(#gGold)"/>
  </g>

  <!-- FITNESS text -->
  <text x="98" y="32" font-family="'Playfair Display', 'Georgia', serif" font-size="26" font-weight="700" fill="url(#gGold)" letter-spacing="2">FITNESS</text>
  <!-- HUB text -->
  <text x="98" y="54" font-family="'DM Sans', 'Arial', sans-serif" font-size="18" font-weight="600" fill="#ffffff" letter-spacing="8">HUB</text>
</svg>
