  <!-- ════ BACK TO TOP BUTTON ════ -->
  <button id="btt-btn" aria-label="{{ 'Back to top'|t }}" title="{{ 'Back to top'|t }}">
    <div class="btt-icon-wrap">
      <i class="bi bi-arrow-up"></i>
    </div>
    <span class="btt-label">{{ 'Top'|t }}</span>
    <div class="btt-ring"></div>
    <svg class="btt-arc" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="22" cy="22" r="19" stroke="rgba(232,201,126,0.12)" stroke-width="2"/>
      <circle class="btt-arc-fill" cx="22" cy="22" r="19"
              stroke="url(#bttGrad)" stroke-width="2"
              stroke-linecap="round"
              stroke-dasharray="119.4"
              stroke-dashoffset="119.4"
              style="transform:rotate(-90deg);transform-origin:center;"/>
      <defs>
        <linearGradient id="bttGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#e8c97e"/>
          <stop offset="100%" stop-color="#c4783a"/>
        </linearGradient>
      </defs>
    </svg>
  </button>
