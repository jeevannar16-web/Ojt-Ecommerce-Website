<!-- Unsubscribed confirmation page -->
{% extends 'layout/base.html' %}
{% load static %}
{% block title %}Unsubscribed — FITNESS HUB{% endblock %}
{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:#08080c;">
  <div style="background:rgba(18,18,24,0.92);border:1px solid rgba(232,201,126,0.1);border-radius:24px;padding:48px 40px;max-width:440px;width:100%;text-align:center;box-shadow:0 32px 96px rgba(0,0,0,0.6);">
    <div style="font-size:3rem;margin-bottom:16px;">😢</div>
    <h1 style="color:#f0ece4;font-size:1.5rem;font-weight:700;margin:0 0 8px;">You've Unsubscribed</h1>
    <p style="color:rgba(255,255,255,0.45);font-size:0.88rem;line-height:1.7;margin:0 0 24px;">
      <strong style="color:#d4af37;">{{ email }}</strong> has been removed from our mailing list. You'll no longer receive newsletter updates from FitnessHub.
    </p>
    <a href="/" style="display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:12px;background:linear-gradient(135deg,#e8c97e,#d4af37 40%,#c4783a);color:#08080c;font-size:0.88rem;font-weight:700;text-decoration:none;text-transform:uppercase;letter-spacing:0.5px;box-shadow:0 4px 20px rgba(232,201,126,0.2);">Back to Home</a>
  </div>
</div>
{% endblock %}
