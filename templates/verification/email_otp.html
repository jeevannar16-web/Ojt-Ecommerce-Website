<!DOCTYPE html>
<html>
<body style="font-family:sans-serif;background:#f4f4f4;padding:24px;">
  <div style="max-width:480px;margin:0 auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">
    <div style="background:linear-gradient(135deg,#d4af37,#b8962e);padding:24px;text-align:center;">
      <h2 style="color:#0d0d0d;margin:0;font-size:1.25rem;">Verify Your Email</h2>
    </div>
    <div style="padding:32px 24px;">
      <p style="color:#333;font-size:0.95rem;line-height:1.6;">Hi <strong>{{ user.username }}</strong>,</p>
      <p style="color:#333;font-size:0.95rem;line-height:1.6;">Use the code below to verify your email address. This code expires in <strong>{{ expires_in }}</strong>.</p>
      <div style="background:#f8f8f8;border-radius:8px;padding:20px;text-align:center;margin:20px 0;letter-spacing:8px;font-size:2rem;font-weight:800;color:#0d0d0d;">
        {{ otp }}
      </div>
      <p style="color:#666;font-size:0.82rem;">Or click the link below:</p>
      <p style="text-align:center;margin:16px 0;">
        <a href="{{ base_url }}/verify/email/{{ token }}/"
           style="display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#d4af37,#b8962e);color:#0d0d0d;text-decoration:none;border-radius:8px;font-weight:700;font-size:0.9rem;">
          Verify Email
        </a>
      </p>
      <p style="color:#999;font-size:0.78rem;margin-top:24px;">If you didn't request this, you can safely ignore this email.</p>
    </div>
  </div>
</body>
</html>
