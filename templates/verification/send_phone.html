<!-- ========================================================================= -->
<!-- Verification: Send Phone SMS Code                                       -->
<!-- ========================================================================= -->
{% extends 'layout/base.html' %}
{% block title %}{{ 'Send Phone Verification'|t }} — FITNESS HUB{% endblock %}
{% block content %}
<div style="max-width:440px;margin:40px auto;padding:32px;background:#141414;border:1px solid #1f1f1f;border-radius:12px;">
  <h2 style="color:#f0ece4;margin:0 0 8px;">{{ 'Verify Your Phone'|t }}</h2>
  <p style="color:#777;font-size:0.88rem;margin:0 0 24px;">{{ "We'll send a verification code via SMS."|t }}</p>
  <form method="post">
    {% csrf_token %}
    <input type="tel" name="phone" placeholder="+977 98XXXXXXXX" required
           style="width:100%;padding:14px;border:1px solid #2a2a2a;border-radius:8px;background:#0e0e0e;color:#f0ece4;font-size:0.95rem;box-sizing:border-box;">
    <button type="submit" style="width:100%;padding:14px;margin-top:16px;border:none;border-radius:8px;background:linear-gradient(135deg,#d4af37,#b8962e);color:#0d0d0d;font-weight:700;font-size:1rem;cursor:pointer;">
      {{ 'Send Code'|t }}
    </button>
  </form>
</div>
{% endblock %}
